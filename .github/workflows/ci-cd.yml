name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
         - name: Downcase repository name
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          # Clean up any leftover directories
          rm -rf gitops
          
          # Securely clone using the token in the URL (Choose your correct repository path below)
          # CURRENTLY FIXED TO THE TARGET PUSH REPOSITORY:
          git clone https://x-access-token:${GIT_TOKEN}@github.com/sahatakrita-ganguly/api-gitops.git gitops
          
          cd gitops
          
          # Update the image tag in deployment.yaml
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|g" deployment.yaml
          else
            sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|g" deployment.yaml
          fi
          
          # Configure Git Identity local to this repository execution
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Commit and Push
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push origin main
